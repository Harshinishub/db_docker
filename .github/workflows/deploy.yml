name: Run pytest and generate report
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t test-app .

      - name: Clean Docker
        run: docker-compose down

      - name: Run Tests
        run: docker-compose up --build    
        
      - name: Copy Report
        if: always()
        run: |
          docker cp test-container:/app/report.html ./report.html
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with: 
          name: pytest-report
          path: report.html

